---
layout: home
---

<header class="post-header"><h1 class="post-title">Home</h1></header>
<p class="home-intro">Course notes, projects, and essays.</p>
{%- include repo_list.html -%}
<div
  id="recent-commits-root"
  data-owner="{{ site.github.owner_name | default: site.github.owner.login }}"
>
  <template id="octicon-sync-template">{% octicon sync %}</template>
  <template id="octicon-alert-template">{% octicon alert %}</template>
  <div id="recent-commits-loading-shell" style="display:none">
    <hr class="section-divider" />
    <section id="recent-commits-block">
      <h2>
        Recent Activity <span class="section-heading-meta">(GitHub commits)</span>
      </h2>
      <p class="recent-commits-loading">
        <span class="recent-commits-loading-icon" aria-hidden="true">
          {% octicon sync %}
        </span>
        Loading recent commits...
      </p>
    </section>
  </div>
</div>
<script>
  document.getElementById("recent-commits-loading-shell")?.style.removeProperty("display");
</script>
<script src="/assets/js/recent-commits.js" defer></script>
{%- include substack_posts.html -%}
