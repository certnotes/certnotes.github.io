# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths-ignore:
      - '**/README.md'

  # Runs every day at midnight UTC
  schedule:
    - cron: "0 0 * * 0"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      should_deploy: ${{ steps.detect_changes.outputs.should_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate recent commits data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          RECENT_COMMITS_SINCE_DAYS: 90
          MAX_REPOS_TO_SCAN: 20
        run: node .github/scripts/build_recent_commits.mjs

      - name: Detect whether we should deploy
        id: detect_changes
        run: |
          set -euo pipefail

          # For push/manual runs: always deploy.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For scheduled runs: deploy if the generated data file changed (or is missing).
          if [ -n "$(git status --porcelain -- _data/recent_commits.json)" ]; then
            echo "_data/recent_commits.json changed; proceeding with build/deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No changes in _data/recent_commits.json; skipping build/deploy."
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        if: steps.detect_changes.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v5

      # Cache Ruby gems + build with Jekyll directly (faster than reinstalling gems each run)
      - name: Setup Ruby
        if: steps.detect_changes.outputs.should_deploy == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Restore Jekyll cache
        if: steps.detect_changes.outputs.should_deploy == 'true'
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: ${{ runner.os }}-jekyll-${{ hashFiles('Gemfile', '_config.yml', '_includes/**', '_layouts/**', '_posts/**', '_sass/**', '*.html', '*.md') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Build with Jekyll
        if: steps.detect_changes.outputs.should_deploy == 'true'
        run: bundle exec jekyll build -d ./_site

      - name: Upload artifact
        if: steps.detect_changes.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
