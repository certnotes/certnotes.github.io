title: AIs Through the Looking Glass
description: Artificial intelligence in more ways than one. A blog and portfolio site focusing on the intersection of technology, social sciences, and humanities.
permalink: /posts/:title/
future: false
timezone: Asia/Seoul
markdown: kramdown
exclude:
  - README.md

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-octicons

remote_theme: jekyll/minima

minima:
  skin: auto
  show_excerpts: true

feed:
  excerpt_only: false

pinned_repos:
  - data-AI-eng
  - linux-cyber
  - BA-PO-econ
  - open-banking-lakehouse
